<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Admin Panel - Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
    }

    #admin-main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
      min-height: 100vh;
    }

    /* Remove default sidebar styles for admin pages */
    #sidebar {
      display: none;
    }

    /* Reset main content margin for admin */
    main {
      margin-left: 0;
    }
  </style>
</head>

<body>
  <main id="admin-main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- No user scripts needed for admin panel -->
</body>

</html>
